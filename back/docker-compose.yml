services:
  db:
    image: docker.io/pgvector/pgvector:pg16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
  ollama:
    image: docker.io/ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_PATH:-ollama_data}:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]

  backend:
    image: docker.io/library/node:24-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5555:5555"
    command: sh -c "npm install --legacy-peer-deps && npx prisma generate && npx prisma migrate deploy && npm run start"
    depends_on:
      - db
      - ollama

  front:
    image: docker.io/library/node:24-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ../front:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    command: sh -c "npm install --legacy-peer-deps && npm run build && npm run start"
    depends_on:
      - db
    environment:
      - HOSTNAME=0.0.0.0

  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - front

volumes:
  ollama_data:
  postgres_data:
